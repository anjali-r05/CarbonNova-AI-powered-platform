<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarbonNova - Join the Movement</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .strength-meter {
            height: 5px;
            background: #222;
            margin-top: -10px;
            margin-bottom: 20px;
            border-radius: 5px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 40px;
            color: var(--text-muted);
            cursor: pointer;
        }

        #alert-box {
            display: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .alert-error {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid red;
            color: #ff8888;
        }
        .alert-success {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
        }
    </style>
</head>
<body>
    <div class="bg-wave"></div>
    <div class="eco-particle" style="width: 20px; height: 20px; left: 10%; animation-duration: 10s;"></div>
    <div class="eco-particle" style="width: 15px; height: 15px; left: 80%; animation-duration: 15s; animation-delay: 2s;"></div>
    <div class="eco-particle" style="width: 30px; height: 30px; left: 50%; animation-duration: 12s; animation-delay: 5s;"></div>

    <div class="auth-container">
        <div class="glass-card auth-card reveal active">
            <div class="flex-center mb-2" style="font-family: var(--font-accent); font-size: 1.8rem; font-weight: 700;">
                <i class="fas fa-leaf text-green" style="margin-right: 10px;"></i> CarbonNova
            </div>
            
            <h2 class="mb-2 text-center">Create Account</h2>
            
            <div id="alert-box"></div>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>

                <div class="input-group password-container">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••" oninput="checkStrength()">
                    <i class="fas fa-eye toggle-password" onclick="toggleVisibility()"></i>
                </div>
                
                <div class="strength-meter">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>
            
            <div class="mt-2 text-center">
                <span class="text-muted">Already have an account?</span> 
                <a href="login.html" class="text-cyan" style="text-decoration: none;">Login here</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function toggleVisibility() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if(pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function checkStrength() {
            const val = document.getElementById('password').value;
            const bar = document.getElementById('strengthBar');
            let strength = 0;
            if(val.length >= 6) strength += 33;
            if(val.match(/[A-Z]/)) strength += 33;
            if(val.match(/[0-9]/)) strength += 34;
            
            bar.style.width = strength + '%';
            if(strength < 50) bar.style.backgroundColor = 'red';
            else if(strength < 100) bar.style.backgroundColor = 'orange';
            else bar.style.backgroundColor = 'var(--primary-green)';
        }

        function handleSignup(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const alertBox = document.getElementById('alert-box');
            
            // Mock Duplicate Email Protection
            if(email === 'test@carbonnova.com') {
                alertBox.className = 'alert-error';
                alertBox.innerText = 'Email already exists! Please login.';
                alertBox.style.display = 'block';
            } else {
                alertBox.className = 'alert-success';
                alertBox.innerText = 'Account created successfully! Redirecting...';
                alertBox.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        }
    </script>
</body>
</html>
