<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarbonNova - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        .password-container {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 40px;
            color: var(--text-muted);
            cursor: pointer;
        }
        #alert-box {
            display: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }
        .alert-error {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid red;
            color: #ff8888;
        }
        .alert-success {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
        }
    </style>
</head>
<body>
    <div class="bg-wave"></div>
    <div class="eco-particle" style="width: 25px; height: 25px; left: 20%; animation-duration: 11s;"></div>
    <div class="eco-particle" style="width: 18px; height: 18px; left: 70%; animation-duration: 14s; animation-delay: 1s;"></div>

    <div class="auth-container">
        <div class="glass-card auth-card reveal active">
            <div class="flex-center mb-2" style="font-family: var(--font-accent); font-size: 1.8rem; font-weight: 700;">
                <i class="fas fa-leaf text-green" style="margin-right: 10px;"></i> CarbonNova
            </div>
            
            <h2 class="mb-2 text-center">Welcome Back</h2>
            
            <div id="alert-box"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>

                <div class="input-group password-container">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                    <i class="fas fa-eye toggle-password" onclick="toggleVisibility()"></i>
                </div>

                <div class="flex-between mb-2" style="font-size: 0.9rem;">
                    <label style="color: var(--text-muted); display:flex; align-items:center; gap:5px;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="text-cyan" style="text-decoration: none;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            
            <div class="mt-2 text-center">
                <span class="text-muted">Don't have an account?</span> 
                <a href="signup.html" class="text-cyan" style="text-decoration: none;">Create one</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function toggleVisibility() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if(pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const alertBox = document.getElementById('alert-box');
            
            alertBox.className = 'alert-success';
            alertBox.innerText = 'Login successful! Redirecting...';
            alertBox.style.display = 'block';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        }
    </script>
</body>
</html>
